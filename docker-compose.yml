version: '3.8'

services:
  app:
    build: .
    container_name: chileneumaticos-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - selenium
    environment:
      WEBDRIVER_URL: "http://selenium:4444/wd/hub"
      SELENIUM_REMOTE: "true"
    volumes:
      - ./:/usr/src/app

  db:
    image: mysql:8.0
    platform: linux/amd64
    container_name: chileneumaticos-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: chileneumaticos
      MYSQL_USER: apiuser
      MYSQL_PASSWORD: apipassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7
    platform: linux/amd64
    container_name: chileneumaticos-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1"]

  selenium:
    image: selenium/standalone-chrome:latest
    platform: linux/amd64
    container_name: chileneumaticos-selenium
    shm_size: "2g"
    ports:
      - "4444:4444"
    restart: unless-stopped

volumes:
  db_data:
